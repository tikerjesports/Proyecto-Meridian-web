<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Meridian</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-dashboard-body">

    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <img src="../assets/logos/meridian-logo.png" alt="Meridian Logo" style="width: 32px; height: 32px; object-fit: contain;">
            </div>
            <div class="logo-text">
                <h2>Meridian</h2>
                <span>Panel de Control</span>
            </div>
            <button class="mobile-close" id="mobileCloseBtn">
                <ion-icon name="close-outline"></ion-icon>
            </button>
        </div>

        <nav class="sidebar-nav">
            <ul id="adminNavList">
                <li><a href="#" data-section="dashboard" class="active"><ion-icon name="grid-outline"></ion-icon> <span>Inicio</span></a></li>
                <li><a href="#" data-section="competitions"><ion-icon name="trophy-outline"></ion-icon> <span>Competiciones</span></a></li>
                <li><a href="#" data-section="teams"><ion-icon name="people-outline"></ion-icon> <span>Equipos</span></a></li>
                <li><a href="#" data-section="matches"><ion-icon name="calendar-outline"></ion-icon> <span>Partidos</span></a></li>
                <li><a href="#" data-section="results"><ion-icon name="checkmark-done-outline"></ion-icon> <span>Resultados</span></a></li>
                <li><a href="#" data-section="rankings"><ion-icon name="bar-chart-outline"></ion-icon> <span>Clasificaciones</span></a></li>
                <li><a href="#" data-section="news"><ion-icon name="newspaper-outline"></ion-icon> <span>Noticias</span></a></li>
                <!-- Restricted to Admin only -->
                <li id="menu-users" style="display: none;"><a href="#" data-section="users"><ion-icon name="shield-checkmark-outline"></ion-icon> <span>Usuarios admin</span></a></li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">
                    <ion-icon name="person-circle-outline"></ion-icon>
                </div>
                <div class="user-details">
                    <span id="currentUserName">Admin</span>
                    <span id="currentUserRole" class="user-role">Administrador</span>
                </div>
            </div>
            <button id="logoutBtn" class="logout-btn" title="Cerrar Sessión">
                <ion-icon name="log-out-outline"></ion-icon>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-topbar">
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <ion-icon name="menu-outline"></ion-icon>
            </button>
            <h1 id="pageTitle" class="topbar-title">Inicio</h1>
            <div class="topbar-actions">
                <a href="../index.html" target="_blank" class="btn btn-secondary btn-sm"><ion-icon name="open-outline"></ion-icon> Ver Web</a>
            </div>
        </header>

        <div class="admin-content" id="adminContent">
            <!-- Content will be dynamically loaded here by JS -->
        </div>
    </main>

    <!-- Modal Template for Form Editing -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Registro</h2>
                <button class="modal-close" id="modalCloseBtn"><ion-icon name="close-outline"></ion-icon></button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic form injects here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            initDashboard();
        });
    </script>
</body>
</html>
