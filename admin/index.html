<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Meridian Esports</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- Base Styles and Admin Styles -->
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-login-body">
    
    <div class="login-container fade-in visible">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon-large">
                    <img src="../assets/logos/meridian-logo.png" alt="Meridian Logo" style="width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 10px var(--accent-glow));">
                </div>
                <h1>Panel Admin</h1>
                <p>Meridian Esports Circuit</p>
            </div>
            
            <form id="adminLoginForm" class="login-form">
                <div id="loginError" class="login-error" style="display: none;">
                    Credenciales incorrectas
                </div>
                
                <div class="form-group">
                    <label for="adminEmail">Email</label>
                    <div class="input-wrapper">
                        <ion-icon name="mail-outline"></ion-icon>
                        <input type="email" id="adminEmail" required placeholder="admin@meridian.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="input-wrapper">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" id="adminPassword" required placeholder="••••••••">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary login-btn">
                    <span class="btn-content">
                        <span>Acceder</span>
                        <ion-icon name="log-in-outline"></ion-icon>
                    </span>
                </button>
            </form>
            <div class="login-footer">
                <a href="../index.html" class="back-link"><ion-icon name="arrow-back-outline"></ion-icon> Volver a la web pública</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="admin.js"></script>
    <script>
        // Init login logic
        document.addEventListener('DOMContentLoaded', () => {
             initAdminData(); // Ensure mock data exists
             const form = document.getElementById('adminLoginForm');
             form.addEventListener('submit', handleLogin);
        });
    </script>
</body>
</html>
